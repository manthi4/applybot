name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: false
        default: "apply"
        type: choice
        options:
          - plan
          - apply
      image_tag:
        description: "Docker image tag to deploy (defaults to current commit SHA)"
        required: false
        type: string

  push:
    branches: [main]

concurrency:
  group: terraform
  cancel-in-progress: false

env:
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_region: ${{ vars.GCP_REGION || 'us-central1' }}
  TF_VAR_anthropic_api_key: ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
  TF_VAR_serpapi_key: ${{ secrets.TF_VAR_SERPAPI_KEY }}
  TF_VAR_image_tag: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '--tf-apply')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: >-
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') ||
          (github.event_name == 'push' && contains(github.event.head_commit.message, '--tf-apply'))
        working-directory: infra
        run: terraform apply -auto-approve tfplan
